<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Barbearia Alura - Contato</title>
</head>
<body>

    <header>
        <div class="caixa">
            <h1><img src="img/imagens-produtos/logo.png" alt="logo"></h1>
            <nav>
                <ul class="navegacao">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contato.html" >Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome">

            <label for="email">Email</label>
            <input type="text" id="email">

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone">

            <textarea name="mensagem" id="" cols="68" rows="10"></textarea>

            <div>
                <label for="radio-email">Email</label>
                <input type="radio" name="radio" id="radio-email">
                
                <label for="radio-telefone">Telefone</label>
                <input type="radio" name="radio" id="radio-telefone">
                
                <label for="radio-whatsapp">WhatsApp</label>
                <input type="radio" name="radio" id="radio-whatsapp">
            </div>

            <label for="checkbox"><input type="checkbox" id="checkbox">Deseja receber mais informações?</label>

            <input type="submit" value="Enviar Formulário">
        </form>
    </main>

    <footer>
        <img src="img/imagens-produtos/logo-branco.png" alt="copytight">
