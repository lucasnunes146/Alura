<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Barbearia Alura - Contato</title>
</head>
<body>

    <header>
        <div class="caixa">
            <h1><img src="img/imagens-produtos/logo.png" alt="logo"></h1>
            <nav>
                <ul class="navegacao">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contato.html" >Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome" class="input-padrao">

            <label for="email">Email</label>
            <input type="text" id="email" class="input-padrao">

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" class="input-padrao">

            <label for="mensagem">Mensagem</label>
            <textarea name="mensagem" id="mensagem" cols="68" rows="10" class="input-padrao"></textarea>

            <div>
                <p>Como prefere o nosso contato?</p>
                <label for="radio-email"><input type="radio" name="contato" id="radio-email"
                    value="email">Email</label>
                
                
                <label for="radio-telefone"><input type="radio" name="contato" id="radio-telefone"
                    value="telefone">Telefone</label>
                
                
                <label for="radio-whatsapp"><input type="radio" name="contato" id="radio-whatsapp"
                    value="whatsapp">WhatsApp</label>
                
            </div>

            <div>
                <p class="p-select">Qual horário prefere ser atendido?</p>
                <select name="selecao" id="select">
                    <option value="selecao">Manhã</option>
                    <option value="selecao">Tarde</option>
                    <option value="selecao">Noite</option>
                </select>
            </div>

            <label class="checkbox"><input type="checkbox">Gostaria de receber nossas novidades por email?</label>

            <input type="submit" value="Enviar Formulário">
        </form>
    </main>

    <footer>
        <img src="img/imagens-produtos/logo-branco.png" alt="copytight">
        <p class="copyright">&copy; Copyright Barbearia Alura - 2022</p>
    </footer>

</body>
</html>
