<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Barbearia Alura - Contato</title>
  </head>
  <body>
    <header>
      <div class="caixa">
        <h1><img src="img/imagens-produtos/logo.png" alt="Logo da Barbearia Alura" /></h1>
        <nav>
          <ul class="navegacao">
            <li><a href="index.html">Home</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="contato.html">Contato</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-contato">
      <form>
        <label for="nome">Nome e Sobrenome</label>
        <!-- Sobre modelos de input para acessibilidade (celular, por exemplo), pesquisar os tipos em mobileinputtypes.com-->
        <input type="text" id="nomesobrenome" class="input-padrao" required />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          class="input-padrao"
          required
          placeholder="seuemail@dominio.com"
        />

        <label for="telefone">Telefone</label>
        <input
          type="tel"
          id="telefone"
          class="input-padrao"
          required
          placeholder="(ddd) xxxx-xxxx"
        />

        <label for="mensagem">Mensagem</label>
        <textarea
          name="mensagem"
          id="mensagem"
          cols="68"
          rows="10"
          class="input-padrao"
          required
          placeholder="Informe o seu caso para entendermos melhor o problema"
        ></textarea>

        <fieldset>
          <!-- referente a configuração de um ou mais campos referentes a um assunto específico-->
          <legend>Como prefere o nosso contato?</legend>
          <label for="radio-email"
            ><input
              type="radio"
              name="contato"
              id="radio-email"
              value="email"
            />Email</label
          >

          <label for="radio-telefone"
            ><input
              type="radio"
              name="contato"
              id="radio-telefone"
              value="telefone"
            />Telefone</label
          >

          <label for="radio-whatsapp"
            ><input
              type="radio"
              name="contato"
              id="radio-whatsapp"
              value="whatsapp"
              checked
            />WhatsApp</label
          >
        </fieldset>

        <fieldset>
          <legend class="select">Qual horário prefere ser atendido?</legend>
          <select name="selecao" id="select">
            <option value="selecao">Manhã</option>
            <option value="selecao">Tarde</option>
            <option value="selecao">Noite</option>
          </select>
        </fieldset>

        <label class="checkbox"
          ><input type="checkbox" checked />Gostaria de receber nossas novidades
          por email?</label
        >

        <input type="submit" value="Enviar Formulário" class="enviar"/>
      </form>

      <table class="tabela-contato">
          <p class="p-table-contato">Dias e Horários de Funcionamento:</p>
          <thead>
              <tr>
                  <th>Dia</th>
                  <th>Horário</th>
              </tr>
          </thead>
          <tbody>
              <tr>
                  <td>Segunda</td>
                  <td>8h ~ 20h</td>
              </tr>
              <tr>
                  <td>Quarta</td>
                  <td>8h ~ 20h</td>
              </tr>
              <tr>
                  <td>Sexta</td>
                  <td>8h ~ 20h</td>
              </tr>
          </tbody>
      </table>

    </main>

    <footer>
      <img src="img/imagens-produtos/logo-branco.png" alt="Logo da Barbearia Alura" />
      <p class="copyright">&copy; Copyright Barbearia Alura - 2022</p>
    </footer>
  </body>
</html>
